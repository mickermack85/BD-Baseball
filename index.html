<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BD Baseball Show Prep</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    body{font-family:system-ui,sans-serif;background:#0b1220;color:#e5e7eb;margin:0}
    main{max-width:980px;margin:0 auto;padding:16px;display:grid;gap:14px}
    .card{background:#111827;border:1px solid #243244;border-radius:10px;padding:14px}
    h1,h2,h3{margin:.2rem 0}.muted{color:#93a4ba}.unv{color:#fca5a5;font-weight:700}
    ul{margin:.3rem 0 .8rem 1.1rem}.status{font-family:monospace;font-size:.9rem}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#1f2937}
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>BD Baseball Show Prep</h1>
      <p class="muted">Static PWA snapshot viewer with explicit verification labels.</p>
      <p>Snapshot: <span id="stamp" class="badge">loading...</span></p>
      <p id="offline" class="muted"></p>
    </div>
    <div class="card">
      <h2>League</h2>
      <p id="leagueHeadline"></p>
      <h3>Verified notes</h3><ul id="leagueVerified"></ul>
      <h3>Unverified notes</h3><ul id="leagueUnverified"></ul>
      <h3>Transactions</h3><ul id="leagueTx"></ul><h3>Source status</h3><pre id="sourceStatus" class="status"></pre>
    </div>
    <div id="teams"></div>
  </main>
<script>
const el = (id)=>document.getElementById(id);
function li(text, unv=false){const n=document.createElement('li'); n.textContent=text; if(unv||/^UNVERIFIED:/i.test(text)) n.className='unv'; return n;}
function fillList(id, items, fallback){const root=el(id); root.innerHTML=''; (items?.length?items:[fallback]).forEach(x=>root.appendChild(li(x)));}
function renderTeam(name, team){
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<h2>${name}</h2><p>${team.headline||'No headline available.'}</p><p class="muted">Emotion: ${team.emotion||'n/a'}</p><div class="status">Source status: ${JSON.stringify(team.source_status||{})}</div><h3>Verified notes</h3><ul></ul><h3>Unverified notes</h3><ul></ul>`;
  const lists=card.querySelectorAll('ul');
  (team.verified_notes||[]).forEach(x=>lists[0].appendChild(li(x)));
  (team.unverified_notes||[]).forEach(x=>lists[1].appendChild(li(x,true)));
  return card;
}
async function load(){
  try{
    const res=await fetch('./data/latest.json',{cache:'no-store'});
    const data=await res.json();
    el('stamp').textContent=data.generated_at || 'missing';
    el('leagueHeadline').textContent=data.league?.headline || 'Not confirmed from available sources.';
    fillList('leagueVerified', data.league?.verified_notes, 'Not confirmed from available sources.');
    fillList('leagueUnverified', data.league?.unverified_notes, 'UNVERIFIED: No league unverified notes listed.');
    fillList('leagueTx', data.league?.transactions, 'Not confirmed from available sources.');
    el('sourceStatus').textContent = JSON.stringify(data.source_status || {}, null, 2);
    const teams=el('teams'); teams.innerHTML='';
    Object.entries(data.teams||{}).forEach(([k,v])=>teams.appendChild(renderTeam(k,v)));
  }catch(e){
    el('stamp').textContent='load failed';
    el('leagueHeadline').textContent='UNVERIFIED: Snapshot could not be loaded.';
  }
}
window.addEventListener('online',()=>el('offline').textContent='');
window.addEventListener('offline',()=>el('offline').textContent='Offline mode: showing cached shell/snapshot when available.');
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
load();
</script>
</body>
</html>
