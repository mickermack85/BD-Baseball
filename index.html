<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BD Baseball Show Prep</title>
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    body{font-family:system-ui,sans-serif;background:#0b1220;color:#e5e7eb;margin:0}
    main{max-width:980px;margin:0 auto;padding:16px;display:grid;gap:14px}
    .card{background:#111827;border:1px solid #243244;border-radius:10px;padding:14px}
    h1,h2,h3{margin:.2rem 0}.muted{color:#93a4ba}.unv{color:#fca5a5;font-weight:700}
    ul{margin:.3rem 0 .8rem 1.1rem}.status{font-family:monospace;font-size:.9rem;white-space:pre-wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#1f2937}
    .warn{background:#3f1d1d;border:1px solid #7f1d1d;color:#fecaca;padding:10px 12px;border-radius:8px;font-weight:600}
    .ok{background:#13321d;border:1px solid #14532d;color:#bbf7d0;padding:8px 12px;border-radius:8px}
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>BD Baseball Show Prep</h1>
      <p class="muted">Static PWA snapshot viewer with explicit verification labels.</p>
      <p>Snapshot: <span id="stamp" class="badge">loading...</span></p>
      <p id="health"></p>
      <p id="offline" class="muted"></p>
    </div>
    <div class="card">
      <h2>League</h2>
      <p id="leagueHeadline"></p>
      <h3>Verified notes</h3><ul id="leagueVerified"></ul>
      <h3>Unverified notes</h3><ul id="leagueUnverified"></ul>
      <h3>Transactions</h3><ul id="leagueTx"></ul>
      <h3>Source status</h3><pre id="sourceStatus" class="status"></pre>
    </div>
    <div id="teams"></div>
  </main>
<script>
"use strict";
const STALE_AFTER_MIN = 24 * 60; // 24h: warn if older

function el(id) { return document.getElementById(id); }
function setText(id, value) { const n = el(id); if (n) n.textContent = value == null ? "" : String(value); }

function liNode(text, opts) {
  const node = document.createElement('li');
  const t = String(text == null ? "" : text);
  node.textContent = t;
  if ((opts && opts.unv) || /^UNVERIFIED:/i.test(t)) node.className = 'unv';
  return node;
}

function fillList(id, items, fallback) {
  const root = el(id);
  if (!root) return;
  while (root.firstChild) root.removeChild(root.firstChild);
  const list = (Array.isArray(items) && items.length) ? items : [fallback];
  list.forEach((x) => root.appendChild(liNode(x)));
}

function makeEl(tag, className, text) {
  const n = document.createElement(tag);
  if (className) n.className = className;
  if (text != null) n.textContent = String(text);
  return n;
}

function renderTeam(name, team) {
  const card = makeEl('div', 'card');
  card.appendChild(makeEl('h2', null, name));
  card.appendChild(makeEl('p', null, team && team.headline ? team.headline : 'No headline available.'));
  card.appendChild(makeEl('p', 'muted', 'Emotion: ' + ((team && team.emotion) || 'n/a')));

  const status = makeEl('div', 'status');
  status.textContent = 'Source status: ' + JSON.stringify((team && team.source_status) || {});
  card.appendChild(status);

  card.appendChild(makeEl('h3', null, 'Verified notes'));
  const v = makeEl('ul');
  ((team && team.verified_notes) || []).forEach((x) => v.appendChild(liNode(x)));
  card.appendChild(v);

  card.appendChild(makeEl('h3', null, 'Unverified notes'));
  const u = makeEl('ul');
  ((team && team.unverified_notes) || []).forEach((x) => u.appendChild(liNode(x, { unv: true })));
  card.appendChild(u);

  return card;
}

function computeHealth(data) {
  const issues = [];
  if (!data || typeof data !== 'object') return { ok: false, issues: ['snapshot missing'] };

  const ts = data.generated_at;
  if (typeof ts === 'string' && ts) {
    const parsed = Date.parse(ts.endsWith('Z') ? ts : ts.replace(/([+-]\d\d):?(\d\d)$/, '$1$2'));
    if (Number.isFinite(parsed)) {
      const ageMin = (Date.now() - parsed) / 60000;
      if (ageMin > STALE_AFTER_MIN) issues.push('snapshot is ' + Math.round(ageMin / 60) + 'h old');
    } else {
      issues.push('generated_at not parseable');
    }
  } else {
    issues.push('generated_at missing');
  }

  const ss = data.source_status || {};
  const lanes = Object.values(ss);
  const verifiedLanes = lanes.filter((s) => s === 'verified').length;
  const errorLanes = lanes.filter((s) => s === 'source_error').length;
  if (lanes.length > 0 && verifiedLanes / lanes.length < 0.5) {
    issues.push('mostly unverified (' + verifiedLanes + '/' + lanes.length + ' verified)');
  }
  if (errorLanes > 0) issues.push(errorLanes + ' source_error lane(s)');

  // Reject obvious sample/empty fixture in production view.
  const lu = (data.league && data.league.unverified_notes) || [];
  if (Array.isArray(lu) && lu.some((x) => typeof x === 'string' && x.indexOf('UNVERIFIED: sample') !== -1)) {
    issues.push('placeholder fixture detected');
  }

  return { ok: issues.length === 0, issues: issues };
}

function renderHealth(data) {
  const root = el('health');
  if (!root) return;
  while (root.firstChild) root.removeChild(root.firstChild);
  const h = computeHealth(data);
  if (h.ok) {
    const ok = makeEl('span', 'ok', 'Sources healthy.');
    root.appendChild(ok);
  } else {
    const warn = makeEl('div', 'warn', 'Source health warning: ' + h.issues.join('; '));
    root.appendChild(warn);
  }
}

async function load() {
  try {
    const res = await fetch('./data/latest.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    setText('stamp', data.generated_at || 'missing');
    renderHealth(data);

    setText('leagueHeadline', (data.league && data.league.headline) || 'Not confirmed from available sources.');
    fillList('leagueVerified', data.league && data.league.verified_notes, 'Not confirmed from available sources.');
    fillList('leagueUnverified', data.league && data.league.unverified_notes, 'UNVERIFIED: No league unverified notes listed.');
    fillList('leagueTx', data.league && data.league.transactions, 'Not confirmed from available sources.');

    setText('sourceStatus', JSON.stringify(data.source_status || {}, null, 2));

    const teams = el('teams');
    while (teams.firstChild) teams.removeChild(teams.firstChild);
    Object.entries(data.teams || {}).forEach(([k, v]) => teams.appendChild(renderTeam(k, v)));
  } catch (e) {
    setText('stamp', 'load failed');
    setText('leagueHeadline', 'UNVERIFIED: Snapshot could not be loaded.');
    const root = el('health');
    while (root.firstChild) root.removeChild(root.firstChild);
    root.appendChild(makeEl('div', 'warn', 'Snapshot load failed: ' + (e && e.message ? e.message : 'unknown error')));
  }
}

window.addEventListener('online', () => setText('offline', ''));
window.addEventListener('offline', () => setText('offline', 'Offline mode: showing cached shell/snapshot when available.'));
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
load();
</script>
</body>
</html>
