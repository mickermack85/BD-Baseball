name: Refresh snapshot

on:
  schedule:
    # Refresh every 2 hours during the show-relevant window (covers
    # mornings/afternoons/evenings on the West Coast). Off-minute (:07)
    # avoids the GitHub Actions cron rush at the top of the hour.
    - cron: "7 13,15,17,19,21,23,1,3,5 * * *"
  workflow_dispatch:
    # Allow manual runs from Actions UI for out-of-band snapshot refreshes.
    inputs:
      slate_date:
        description: "Optional YYYY-MM-DD override for the slate date (defaults to today in BD_BASEBALL_TIMEZONE)."
        required: false
        default: ""
      timezone:
        description: "Optional IANA timezone override (defaults to BD_BASEBALL_TIMEZONE / America/Los_Angeles)."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build snapshot from MLB Stats API
        env:
          # Optional: when this repo secret is set, the builder folds the BD Bets
          # MLB picks/insights feed into the snapshot under `bd_bets`. If the
          # secret is unset/empty the builder simply omits the section.
          BD_BETS_URL: ${{ secrets.BD_BETS_URL }}
          # Use the West Coast slate clock by default so a refresh at 03:00 UTC
          # (8pm PT the previous day) still surfaces the correct slate.
          BD_BASEBALL_TIMEZONE: America/Los_Angeles
        run: |
          set -e
          args=()
          if [ -n "${{ github.event.inputs.slate_date }}" ]; then
            args+=(--slate-date "${{ github.event.inputs.slate_date }}")
          fi
          if [ -n "${{ github.event.inputs.timezone }}" ]; then
            args+=(--timezone "${{ github.event.inputs.timezone }}")
          fi
          python scripts/build_snapshot.py "${args[@]}"

      - name: Validate latest snapshot
        id: validate
        run: python scripts/validate_snapshot.py --path data/latest.json

      - name: Commit refreshed latest snapshot to main (if changed)
        run: |
          set -e
          git config user.name  "bd-baseball-bot"
          git config user.email "bd-baseball-bot@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh latest snapshot [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
