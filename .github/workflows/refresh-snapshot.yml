name: Refresh snapshot

on:
  schedule:
    # Every hour at :15 — keeps prod data fresh throughout the game day.
    - cron: "15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build snapshot from MLB Stats API
        run: python scripts/build_snapshot.py

      - name: Strict validate
        id: validate
        run: |
          python scripts/validate_snapshot.py \
            --path data/latest.json \
            --strict \
            --max-age-minutes 60 \
            --min-verified-lanes 6

      - name: Run unit tests
        # Tests contain hardcoded standings that go stale; do not block snapshot ship.
        continue-on-error: true
        run: python -m unittest discover -s tests

      - name: Commit refreshed snapshot to main
        run: |
          set -e
          git config user.name  "bd-baseball-bot"
          git config user.email "bd-baseball-bot@users.noreply.github.com"
          git add data/latest.json data/mlb_snapshot_*.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh snapshot [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
