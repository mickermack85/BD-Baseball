name: Refresh snapshot

on:
  schedule:
    # Nightly at 03:15 UTC.
    - cron: "15 3 * * *"
  workflow_dispatch:
    # Allow manual runs from Actions UI for out-of-band snapshot refreshes.

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build snapshot from MLB Stats API
        run: python scripts/build_snapshot.py

      - name: Validate latest snapshot
        id: validate
        run: python scripts/validate_snapshot.py --path data/latest.json

      - name: Commit refreshed latest snapshot to main (if changed)
        run: |
          set -e
          git config user.name  "bd-baseball-bot"
          git config user.email "bd-baseball-bot@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh latest snapshot [skip ci]"
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
