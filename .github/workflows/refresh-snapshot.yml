name: Refresh snapshot

on:
  schedule:
    # 13:30 and 22:30 UTC — pre-game and mid-game windows. Tweak as needed.
    - cron: "30 13 * * *"
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write token to commit back; the default GITHUB_TOKEN suffices
          # because of permissions: contents: write above.
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build snapshot from MLB Stats API
        run: python scripts/build_snapshot.py

      - name: Strict validate
        id: validate
        run: |
          python scripts/validate_snapshot.py \
            --path data/latest.json \
            --strict \
            --max-age-minutes 60 \
            --min-verified-lanes 6

      - name: Run unit tests
        run: python -m unittest discover -s tests
        continue-on-error: true

      - name: Detect snapshot changes
        id: diff
        run: |
          set -e
          git add data/latest.json data/mlb_snapshot_*.json
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          # Reset staging; create-pull-request will re-stage on its own branch.
          git reset

      - name: Open PR with refreshed snapshot
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): refresh snapshot"
          title: "chore(data): refresh snapshot"
          body: |
            Automated daily snapshot refresh from the MLB Stats API.

            - Source: scripts/build_snapshot.py
            - Validated with scripts/validate_snapshot.py (strict, min-verified-lanes=6)
          branch: chore/refresh-snapshot
          base: main
          delete-branch: true
          add-paths: |
            data/latest.json
            data/mlb_snapshot_*.json
          author: "bd-baseball-bot <bd-baseball-bot@users.noreply.github.com>"
          committer: "bd-baseball-bot <bd-baseball-bot@users.noreply.github.com>"
